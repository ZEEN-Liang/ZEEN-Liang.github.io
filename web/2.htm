<!DOCTYPE html>

<html>
    <head>
        <title>PICTURE WALL</title>
        <style>
            *{
                padding: 0;
                margin: 0;
            }
            header{
                position:fixed;
                top: 0;
                left: 0;
                width: 100%;
                padding: 20px 100px;
                justify-content: space-between;
                align-items: center;
                background-color: #9263df;
                z-index: 20;
                opacity: 0.8;
            }
            header ul{
                display: flex;
                justify-content: space-around;
                align-items: center;
            }


            header ul li{
                list-style: none;
                left: auto;
                color: #fff;
            }

            header ul li span{
                text-decoration: none;
                padding: 6px 15px;
                color: #ffbbff;
                font-size: 30px;
                border-radius: 20px;
                font-weight: 900;
            }
            
            header ul li a{
                text-decoration: none;
                padding: 6px 15px;
                color: #fff;
                border-radius: 20px;
            }

            header ul li a:hover{
                background: #fff;
                color: #ffbbff;
            }

            body{
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #fffaff;
                background-position: center;
                background-size: cover;
                height: 100%;
                background-attachment: fixed;

            }

            main{
                display: grid;
                gap:2rem;
                grid-template-columns: repeat(3,500px);
                overflow-y: hidden;
                padding: 50px;
            }

            section{
                display: flex;
                gap: 2rem;
                flex-direction: column;
            }


            section:nth-child(1),
            section:nth-child(3){
                animation: scroller linear;
                animation-timeline: scroll(root);
                flex-direction: column-reverse;
                translate: 0% calc(-100% + 100vh);
            }

            section img{
                
                box-shadow: 0 0 10px #0002;
                border-radius: 5px;
                transition: .3s;   
            }

            section img:hover{
                transform: scale(1.20);
                box-shadow: 0 0 20px rgba(150,50,50,0.5);
                z-index: 10;
            }
            
            @keyframes scroller {
                to{
                    translate: 0% calc(100% - 100vh);
                }
            }

        </style>
        
    </head>

    <script>
