                box-sizing: border-box;
            }
     
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                width: 100%;
                height: 100%;
                transition: ease-in-out;
                background-size: cover;
                background-image: url("../images/1b.jpg");
                background-position-x: 100%;
            }

            .box{
                position: absolute;
                display: flex;
                align-items: center;
            }

            .box .item{
                position: absolute;
                top:calc(50% - 300px);
                left: calc(50% - 200px);
                width: 400px;
                height: 600px;
                transition: 0.25s;
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
                user-select: none;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 5em;
                font-family: consolas;
                font-weight: 800;
                color: #fff;
                opacity: 0;
                background-position: center;
                background-size: cover;
            }

            .box .item:nth-child(1){
                transform: translate3d(-500px,0,0) scale(0.8);
                opacity: 1;
                z-index: 1;
            }
            .box .item:nth-child(2){
                transform: translate3d(-500px,0,0) scale(0.8);
                opacity: 1;
                z-index: 2;
            }
            .box .item:nth-child(3){
                transform: translate3d(-300px,0,0) scale(0.9);
                opacity: 1;
                z-index: 3;
                font-size: 6em;
            }
            .box .item:nth-child(4){
                transform: translate3d(0px,0,0) scale(1);
                opacity: 1;
                z-index: 4;
                color: #fff;
                font-size: 8em;
            }
            .box .item:nth-child(5){
